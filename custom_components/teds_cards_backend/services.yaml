add_alarm:
  name: Add alarm
  fields:
    label: { required: true, selector: { text: {} } }
    time: { required: true, selector: { time: {} } }
    days: { selector: { select: { multiple: true, options: ["0","1","2","3","4","5","6"] } } }
    description: { selector: { text: {} } }
    enabled: { selector: { boolean: {} } }
    location: { selector: { area: {} } }
update_alarm:
  name: Update alarm
  fields:
    id: { required: true, selector: { text: {} } }
remove_alarm:
  name: Remove alarm
  fields:
    id: { required: true, selector: { text: {} } }
start_timer:
  name: Start timer
  fields:
    name: { required: true, selector: { text: {} } }
    hours: { selector: { number: { min: 0, max: 23 } } }
    minutes: { selector: { number: { min: 0, max: 59 } } }
    seconds: { selector: { number: { min: 0, max: 59 } } }
    location: { selector: { area: {} } }
cancel_timer:
  name: Cancel timer
  fields:
    id: { required: true, selector: { text: {} } }
remove_recent:
  name: Remove recent timer
  fields:
    name: { required: true, selector: { text: {} } }
    hours: { selector: { number: { min: 0, max: 23 } } }
    minutes: { selector: { number: { min: 0, max: 59 } } }
    seconds: { selector: { number: { min: 0, max: 59 } } }
    location: { selector: { area: {} } }
pause_timer:
  name: Pause timer
  fields:
    id: { required: true, selector: { text: {} } }
resume_timer:
  name: Resume timer
  fields:
    id: { required: true, selector: { text: {} } }
update_timer:
  name: Update timer
  fields:
    id: { required: true, selector: { text: {} } }
    name: { selector: { text: {} } }
    hours: { selector: { number: { min: 0, max: 23 } } }
    minutes: { selector: { number: { min: 0, max: 59 } } }
    seconds: { selector: { number: { min: 0, max: 59 } } }
    location: { selector: { area: {} } }
notify:
  name: Show notification
  fields:
    title: { required: true, selector: { text: {} } }
    message: { required: true, selector: { text: {} } }
    severity: { selector: { select: { options: ["info", "success", "warning", "danger", "tip"] } } }
    icon: { selector: { icon: {} } }
    area: { selector: { area: {} } }
    timeout: { selector: { number: { min: 0, max: 600, unit_of_measurement: "s" } } }
    persistence: { selector: { select: { options: ["transient", "normal", "sticky"] } } }
    id: { selector: { text: {} } }
dismiss_notification:
  name: Dismiss notification
  fields:
    id: { required: true, selector: { text: {} } }
mark_read:
  name: Mark notification(s) read
  fields:
    id: { selector: { text: {} } }
    area: { selector: { area: {} } }
clear_notifications:
  name: Clear notifications
  fields:
    area: { selector: { area: {} } }
announce:
  name: Announce
  description: Speak a message on the targeted Ted's Dashboard devices/areas and show a prominent toast.
  fields:
    message: { required: true, selector: { text: {} } }
    title: { selector: { text: {} } }
    icon: { selector: { icon: {} } }
    areas: { selector: { area: { multiple: true } } }
    devices: { selector: { object: {} } }
    persistent: { selector: { boolean: {} } }
    repeat_sound: { selector: { boolean: {} } }
    timeout: { selector: { number: { min: 0, max: 600, unit_of_measurement: "s" } } }
    volume: { selector: { number: { min: 0, max: 100, unit_of_measurement: "%" } } }
    source_device: { selector: { text: {} } }
remove_announcement:
  name: Remove recent announcement
  fields:
    id: { required: true, selector: { text: {} } }
set_setting:
  name: Set setting
  fields:
    key: { required: true, selector: { text: {} } }
    value: { selector: { text: {} } }
    scope: { selector: { select: { options: ["global", "device"] } } }
    device_id: { selector: { text: {} } }
clear_setting:
  name: Clear setting
  fields:
    key: { selector: { text: {} } }
    scope: { selector: { select: { options: ["global", "device"] } } }
    device_id: { selector: { text: {} } }
register_device:
  name: Register device
  fields:
    device_id: { required: true, selector: { text: {} } }
    area: { selector: { area: {} } }
    name: { selector: { text: {} } }
    media_player: { selector: { entity: { domain: media_player } } }
    client_width: { selector: { number: { min: 0, mode: box } } }
    client_height: { selector: { number: { min: 0, mode: box } } }
    client_orientation: { selector: { text: {} } }
    client_form_factor: { selector: { text: {} } }

check_requirements:
  name: Check requirements
  description: Re-run server-side detection of optional dependencies (updates sensor.teds_requirements).
